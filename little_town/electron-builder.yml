# electron-builder configuration for Town Inbox.
# Run `npm run dist` (or :win/:mac/:linux) to produce installers.

appId: studio.spectra.towninbox
productName: Town Inbox
copyright: Copyright © 2026 Harvey Moon

# Asar holds the Electron main/preload + package.json. dist/ and the
# sibling backend/ live OUTSIDE asar in `extraResources` because:
#   - Backend is spawned as a Node child process that needs real
#     filesystem access for its node_modules + native modules.
#   - The backend's Express static middleware needs to read the dist/
#     files at runtime, which is awkward from inside an asar archive.
files:
  - electron/**
  - package.json
extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!node_modules/.cache/**"
      - "!.gmail-tokens.json"   # never bake user tokens into the installer
      - "!.env"                 # never bake secrets into the installer
  - from: dist
    to: dist
    filter:
      - "**/*"

directories:
  output: release

asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    # `dir` produces an unpacked folder under release/win-unpacked/ that
    # contains TownInbox.exe — fully portable (zip it, copy it to a
    # USB stick, double-click; no install). Also skips the
    # winCodeSign / NSIS infrastructure that needs admin rights for
    # symlink creation on Windows.
    - target: dir
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
